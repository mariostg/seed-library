{% extends "core/base.html" %}
{% load i18n %}
{% load static %}

{% block title %}{{title}}{% endblock %}

{% block content %}
  <div class="admin-container">
    <h1>{{ title }}</h1>

    <div class="status-form">
      <form method="post">
        {% csrf_token %}

        <div class="status-group">
          <h2>Library Settings</h2>

          {% for field in form %}
            <div class="status-item">
              <label for="{{ field.id_for_label }}">
                <input
                  type="checkbox"
                  name="{{ field.name }}"
                  id="{{ field.id_for_label }}"
                  {% if field.value %}checked{% endif %}
                >
                <span>{{ field.label }}</span>
              </label>
              {% if field.help_text %}
                <small>{{ field.help_text|safe }}</small>
              {% endif %}
            </div>
          {% endfor %}
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'admin-dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <style>
    .status-group { margin: 20px 0; }
    .status-item { margin: 15px 0; }
    .status-item label { display: flex; align-items: center; gap: 10px; }
    .status-item small { display: block; margin-left: 30px; color: #666; }
    .form-actions { margin-top: 30px; }
    .btn { padding: 10px 20px; margin-right: 10px; text-decoration: none; }
  </style>
{% endblock %}
